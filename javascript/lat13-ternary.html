<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ternary</title>
</head>
<body>
    <script>
        //ternary atau 2 kondisi dalam satu waktu dan untuk menentukan kondisi tersebut tergantung variabel kunci
        let siswa = "Budi Santoso";
        let nilai = 70;
        let ket = (nilai >= 60) ? "Lulus" : "Gagal";
        document.write("<br>Siswa bernama " + siswa + " Dengan Nilai " + nilai + " Dinyatakan " + ket);

    </script>
</body>
</html>
