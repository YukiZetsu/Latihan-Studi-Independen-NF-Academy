<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembelian Barang - SwtichCase</title>
</head>
<body>
    <script>
        //ada pelanggan membeli barang elektronik
        //barang : tv >=3jt, laptop>=12jt, radio>=2jt
        // tentukan proses diskon dari setiap barang
        // lalu cetak hasil pembelian barang dan totalnya

        let pembeli = "kasino"; //input diubah
        let barang = "TV"; //input diubah
        let harga_satuan = 0;

        switch(barang){
            case "TV" : harga_satuan = 3000000; break;
            case "LAPTOP": harga_satuan = 12000000; break;
            case "RADIO": harga_satuan = 2000000; break;
            default : harga_satuan = 0;
        }

        // deklarasi variabel proses
        let jml_beli = 10; //input diubah
        let bruto = harga_satuan * jml_beli;
        let ppn = bruto * 0.11;

        //membuat minimal diskon dari pembelian produk diatas
        let diskon = 0;
        if(barang == "TV") diskon = 0.3 * bruto;
        else if(barang == "Laptop") diskon = 0.02 * bruto;
        else diskon = 0.05 * bruto;
        let hasil_diskon = bruto - diskon;

        // cetak proses diatas
        document.write("<h1>Data Pembelian</h1>");
        document.write(
            "<br>Pembeli : " + pembeli + 
            "<br>Barang : " + barang + 
            "<br>Jumlah Beli Barang : " + jml_beli + 
            "<br>Harga Satuan : " + harga_satuan + 
            "<br>Total Harga : " + bruto + 
            "<br>Diskon : " + diskon +
            "<br>PPN : " + ppn +
            "<br> Total Harga di potong diskon : " + hasil_diskon  
        );


    </script>
</body>
</html>
