<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pemesanan Tiket Travel</title>
    <link rel="stylesheet" href="css/form.css">
</head>
<body>
    <div class="container">
        <h1 class="header">Form Pemesanan Tiket Travel</h1>
        <form action="" method="" class="form-contoh">
            <!-- Nama Lengkap -->
            <label for="fullname">Nama Lengkap:</label>
            <input type="text" name="fullname" id="fullname"
            placeholder="Masukkan Nama Lengkap" required>
            <br><br>

            <!-- Email -->
            <label for="email">Email:</label>
            <input type="email" name="email" id="email"
            placeholder="Masukkan Email" required>
            <br><br>


            <!-- Nomor Telepon -->
            <label for="tlp">Nomor Telepon:</label>
            <input type="tel" name="tlp" id="tlp"
            placeholder="Masukkan Nomor Telepon" required>
            <br><br>

            <!-- Rute Perjalanan -->
            <label for="rute">Rute Perjalanan:</label>
            <select name="rute" id="rute">
                <option value="">--Pilih Rute--</option>
                <option value="Jakarta - Bandung">Jakarta - Bandung</option>
                <option value="Bandung - Surabaya">Bandung - Surabaya</option>
                <option value="Jakarta - Yogyakarta">Jakarta - Yogyakarta</option>
            </select>
            <br><br>

            <!-- Tanggal Keberangkatan -->
            <label for="date">Tanggal Keberangkatan:</label>
            <input type="date" name="date" id="date" required>
            <br><br>

            <!-- Waktu Keberangkatan -->
            <label for="waktu">Waktu Keberangkatan:</label>
            <select name="waktu" id="waktu">
                <option value="08.00">08.00</option>
                <option value="12.00">12.00</option>
                <option value="18.00">18.00</option>
            </select>
            <br><br>
            
            <!-- Jumlah Penumpang -->
            <label for="penumpang">Jumlah Penumpang:</label>
            <input type="number" name="penumpang" id="penumpang" min="1" max="6" required value="1">
            <br><br>

            <!-- Metode Pembayaran -->
            <label for="pembayaran">Metode Pembayaran:</label>
            <select name="pembayaran" id="pembayaran" required>
                <option value="">--Pilih Metode Pembayaran--</option>
                <option value="Transfer-Bank">Transfer Bank</option>
                <option value="Kartu-Kredit">Kartu Kredit</option>
                <option value="e-wallet">E-Wallet</option>
            </select>
            <br><br>

            <!-- Tombol Submit -->
             <button type="submit">Pesan Tiket</button>
             <button type="reset">Batal</button>

        </form>
    </div>

</body>
</html>
