<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Logika</title>
</head>
<body>
    <script>
    let x = true;
    let y = false;

    //operator && (Logical AND) salah 1 salah keduanya dianggap salah
    document.write("x && y: " + (x && y) + "<br>");

    //operator || (Logical OR) salah 1 dianggap benar maka 2 2 nya benar
    document.write("x || y: " + (x || y) + "<br>");


    //operator ! (Logical NOT)
    document.write("!x: " + (!x) + "<br>");
    document.write("!y: " + (!y) + "<br>");

    </script>
</body>
</html>
