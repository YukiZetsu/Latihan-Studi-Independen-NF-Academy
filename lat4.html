<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Form</title>
</head>
<body>
    <h2>FORMULIR</h2>
    <hr><br>
    <form action="">
    <label for="">Masukkan Nama Anda:</label>
    <input type="text" name="nama" placeholder="isi namanya.." size="25" 
    maxlength="20">
    <br><br>
    <label for="">Masukkan Password:</label>
    <input type="password" name="pass">
    <br><br>
    <label for="">Masukkan Email Anda:</label>
    <input type="email" name="emailku" placeholder="nama@gmail.com">
    <br><br>
    <label for="">Masukkan Warna Favorit:</label>
    <input type="color" name="favcolor">
    <br><br>
    <label for="">Masukkan Tanggal Lahir:</label>
    <input type="date" name="tgl_lahir">
    <br><br>
    <label for="">Input Nilai</label>
    <input type="number" name="nilai" min="0" max="10">
    <br><br>
    <label for="">Pilih Minggu:</label>
    <input type="week" name="minggu">
    <br><br>
    <label for="">Pilih Bulan:</label>
    <input type="month" name="januari">
    <br><br>
    <label for="">Upload Foto</label>
    <input type="file" name="foto">
    <br><br>
    <label for="">Pilih Hobi:</label><br>
    <input type="checkbox" name="hobi" value="futsal">Futsal<br>
    <input type="checkbox" name="hobi" value="voli">Voli<br>
    <input type="checkbox" name="hobi" value="renang">Renang<br>
    <input type="checkbox" name="hobi" value="basket">Basket<br>
    <br><br>
    <label for="">Jenis Kelamin:</label>
    <input type="radio" name="jk" value="L">Laki-Laki
    <input type="radio" name="jk" value="P">Perempuan
    <br><br>
    <label for="">Prodi Rumpun Ti</label>
    <select name="prodi">
        <option value="">--Pilih Prodi--</option>
        <option value="ti">Teknik Informatika</option>
        <option value="si">Sistem Informasi</option>
        <option value="pti">Pendidikan Teknologi Informasi</option>
    </select>
    <br><br>
    <label for="">Kolom Komentar</label>
    <textarea name="komentar" cols="25" rows="5"></textarea>
    <br><br>
    <input type="submit" name="proses" value="Simpan">
    <input type="reset" name="unproses" value="Batal">




    <br><br>

    </form>
</body>
</html>
