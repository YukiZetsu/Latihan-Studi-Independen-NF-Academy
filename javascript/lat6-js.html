<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Pembanding</title>
</head>
<body>
    <script>
        let x = 10;
        let y = 20;

        //operator ==
        document.write(x == y);
        document.write("<br>");

        //operator ===
        document.write(x === y);
        document.write("<br>");

        //operator !==
        document.write(x != y);
        document.write("<br>");

        //operator !==
        document.write(x !== y);
        document.write("<br>");

        //operator >
        document.write(x > y);
        document.write("<br>");

        //operator <
        document.write(x < y);
        document.write("<br>");

        //operator >=
        document.write(x >= y);
        document.write("<br>");

        //operator <=
        document.write(x <= y);
        document.write("<br>");

    </script>
</body>
</html>
