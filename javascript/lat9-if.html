<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IF KONDISI</title>
</head>
<body>
    <!-- jika umur lebih dari 20 tahun, maka anda dapat mengendarai mobil
    jika umur lebih 17 tahun, maka anda dapat mengendarai motor
    jika umur lebih 10 tahun, maka anda dapat mengendarai sepeda
    selain itu tidak boleh -->
     <script>
        // let umur = 18; //ubah umur
        let umur = prompt("Masukkan Umur Anda:"); //ubah umur di input web
        if (umur >= 19) {
            document.write("Anda dapat mengendarai Mobil");
        } 
        else if (umur >= 17) {
            document.write("Anda dapat mengendarai Motor");
        }
        else if (umur >= 10) {
            document.write("Anda dapat mengendarai Sepeda");
        }
        else {
            document.write("Tidak Boleh");
        }

     </script>

</body>
</html>
