<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Case</title>
</head>
<body>
    <script>
    //  switch case : sebagai pengecekan sebuah nilai -->
    //  break : stop/untuk pemberhentian dari suatu  perulangan pada switch case
    //  case/elseif
    //  default /else


    // let ukuran = "l"; //nilai input berupa jenis pakaian
    let ukuran = prompt("Masukkan Ukuran Baju Anda")
    switch (ukuran) {
        case "L" :
        case "l" :
            document.write("Large");
            break;
        case "M" :
        case "m" :
            document.write ("Medium");
            break;
        default:
            document.write("Small");

    }
    </script>
    <hr>
    <script>
        switch (new Date(). getDay ()){
            case 0:
            day = "Minggu";
            break;
            case 1:
            day = "Senin";
            break;
            case 2:
            day = "Selasa";
            break;
            case 3:
            day = "Rabu";
            break;
            case 4:
            day = "Kamis";
            break;
            case 5:
            day = "Jumat";
            break;
             case 6:
            day = "Sabtu";
            break;
        }

        document.write("Hari ini adalah hari: " + day);
    </script>
</body>
</html>
