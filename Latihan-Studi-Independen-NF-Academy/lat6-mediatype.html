<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Type</title>
    <style>
        @media screen {
            p.tulis{
                font-family: Arial, Helvetica, sans-serif;
                font-size: 15px;
                color: blue;
            }
        }

        @media print {
            p.tulis{
            font-family: Helvetica;
            font-size: 100px;
            color: red;               
            }
        }
    </style>
</head>
<body>
    <p class="tulis">NF ACADEMY.OKEY</p>

</body>
</html>
