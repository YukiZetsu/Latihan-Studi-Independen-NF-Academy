    <script>
        let no;
        for(no=1; no<=10; no++) {
            if(no == 20) continue; //lanjut looping tapi skip angkanya
            if(no == 30) break; //benar2 keluar dari looping
            document.write("<br>No. " + no);
        }
    </script>
    <hr><br>
    <script>
        let angka;
        for(angka=100; angka>=50; angka--) {
            document.write("<br>No. " + angka);
        }
    </script>
    <hr><br>
    <script>
        let nilai;
        for(nilai=1; nilai<=50; nilai++) {
            //tentukan bilangan genap dengan modulus 2 sisa 0
            if (nilai % 2 == 0) document.write("<br>Nilai. " + nilai);
        }
    </script>
