<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IF</title>
</head>
<body>
    <script>
        let pelanggan = "Wahyu"
        let totalBelanja = 10000;
        let keterangan = "";

        //jika total belanja pelanggan lebih dari 5000, maka "Selamat Wahyu, Anda mendapatkan hadiah",selain itu "Terimakasih wahyu sudah berbelanja"
        
        if (totalBelanja > 5000) {
            keterangan = "Selamat " + pelanggan + " Anda mendapatkan Hadiah";
        }
        else {
            keterangan = "Terimakasih " + pelanggan + " Sudah Berbelanja";

        }


        document.write(keterangan);
    </script>
</body>
</html>
