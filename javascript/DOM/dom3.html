<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mengelola DOM Attribute</title>
</head>

<style>
    #container {
        width: 300px;
        height: 300px;
        display: block;
        justify-content: center;
        border: 2px solid black;
        margin-bottom: 20px;
    }

    img {
        max-width: 100%;
        max-height: 100%;
    }
    .background-color{
        background-color: blueviolet;
    }

</style>
<body>
    <div id="container" class="background-color">
        <img id="gambar" src="gambar/banner1.png" alt="gambar default" style="display: none;">
    </div>
    <button onclick="tambahGambar()">Tambah Gambar</button>
    <script src="script.js"></script>
</body>
</html>
